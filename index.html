<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>手話レコ — 手話サークルレクリエーションコレクション</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700;900&family=RocknRoll+One&family=Kaisei+Decol:wght@500;700&family=M+PLUS+1+Code:wght@500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* 画用紙パレット — 彩度は紙色らしく控えめ */
    --cream:   #F6EED6;      /* 地: 淡クリーム */
    --cream-2: #EFE4C4;      /* 地2: もう少し黄ばみ */
    --paper:   #FFF8E7;      /* カード紙 */
    --ink:     #1F1A17;      /* 墨 */
    --ink-2:   #3A332D;
    --ink-3:   #6B6258;
    --ink-4:   #948A7D;

    --red:     #D94A3D;      /* 朱赤 */
    --red-ink: #8A2E26;
    --yellow:  #E8B52A;      /* マスタード */
    --yellow-ink:#8A6A14;
    --green:   #5E9B5A;      /* ミントよりサルビア緑 */
    --green-ink:#2F5B2C;
    --blue:    #2D6BA8;      /* 画用紙ブルー */
    --blue-ink:#143A63;
    --pink:    #E48AA6;      /* 差し色ピンク */
  }

  html, body { background: var(--cream); }
  body {
    min-height: 100vh;
    color: var(--ink);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-weight: 500;
    -webkit-font-smoothing: antialiased;
    letter-spacing: 0.02em;
    overflow-x: hidden;
    background:
      /* 方眼 */
      linear-gradient(to right, rgba(31,26,23,0.05) 1px, transparent 1px) 0 0/32px 32px,
      linear-gradient(to bottom, rgba(31,26,23,0.05) 1px, transparent 1px) 0 0/32px 32px,
      /* 紙の色ムラ */
      radial-gradient(800px 400px at 5% 10%, rgba(232,181,42,0.10), transparent 60%),
      radial-gradient(900px 500px at 95% 85%, rgba(217,74,61,0.06), transparent 60%),
      var(--cream);
    background-attachment: fixed;
  }
  /* ノイズ（紙の質感） */
  body::before {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none; z-index: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.12  0 0 0 0 0.10  0 0 0 0 0.08  0 0 0 0.07 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    opacity: 0.6;
    mix-blend-mode: multiply;
  }

  ::selection { background: var(--yellow); color: var(--ink); }

  /* ─── ページ外周 ───────────────────────────────────── */
  .page {
    position: relative; z-index: 1;
    max-width: 1120px;
    margin: 0 auto;
    padding: 28px 24px 80px;
  }

  /* ─── ヘッダー(おもちゃ箱のフタ) ─────────────────── */
  .boxlid {
    position: relative;
    background: var(--red);
    color: var(--cream);
    padding: 34px 36px 44px;
    box-shadow:
      0 0 0 4px var(--cream) inset,
      0 0 0 5px var(--ink) inset,
      6px 6px 0 0 var(--ink);
    border: 2px solid var(--ink);
    overflow: hidden;
  }
  /* フタの色紙ストライプ */
  .boxlid::before {
    content: "";
    position: absolute; inset: 0;
    background:
      repeating-linear-gradient(
        -35deg,
        rgba(255,255,255,0.00) 0 22px,
        rgba(255,248,231,0.06) 22px 28px,
        rgba(255,255,255,0.00) 28px 54px
      );
    pointer-events: none;
  }
  .boxlid-top {
    display: flex; justify-content: space-between; align-items: center;
    font-family: 'M PLUS 1 Code', monospace;
    font-size: 11px; letter-spacing: 0.2em;
    margin-bottom: 22px;
    text-transform: uppercase;
    position: relative;
  }
  .boxlid-top .corner {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 4px 10px;
    background: var(--cream); color: var(--ink);
    border: 2px solid var(--ink);
    box-shadow: 2px 2px 0 0 var(--ink);
    font-weight: 700;
  }
  .boxlid-top .corner .dot {
    width: 8px; height: 8px; background: var(--red); border: 1.5px solid var(--ink);
    display: inline-block;
  }
  .boxlid-top .tag-corner {
    background: var(--yellow); color: var(--ink);
  }

  .boxlid-main {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: end;
    gap: 28px;
    position: relative;
  }
  .boxlid-title {
    font-family: 'Kaisei Decol', serif;
    font-weight: 700;
    font-size: clamp(56px, 9vw, 128px);
    line-height: 0.92;
    letter-spacing: 0.02em;
    color: var(--cream);
    white-space: nowrap;
    text-shadow:
      4px 4px 0 var(--ink),
      4px 4px 0 2px var(--ink);
    position: relative;
    display: inline-block;
  }
  .boxlid-title .reco {
    color: var(--yellow);
  }
  /* タイトル右の星 */
  .star {
    display: inline-block;
    width: 1em; height: 1em;
    background: var(--yellow);
    border: 2px solid var(--ink);
    clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    vertical-align: 0.05em;
    margin-left: 0.1em;
    transform: rotate(-8deg);
  }
  .boxlid-sub-wrap { text-align: right; }
  .subtitle-ribbon {
    display: inline-block;
    background: var(--cream); color: var(--ink);
    border: 2px solid var(--ink);
    padding: 6px 14px 6px 22px;
    font-family: 'RocknRoll One', sans-serif;
    font-size: 13px;
    letter-spacing: 0.12em;
    box-shadow: 3px 3px 0 0 var(--ink);
    clip-path: polygon(12px 0, 100% 0, 100% 100%, 12px 100%, 0 50%);
    margin-bottom: 10px;
  }
  .volume-stamp {
    display: inline-block;
    color: var(--cream);
    border: 2px dashed var(--cream);
    padding: 6px 14px;
    font-family: 'M PLUS 1 Code', monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
    transform: rotate(-3deg);
  }
  .volume-stamp b {
    font-family: 'Kaisei Decol', serif;
    font-size: 22px;
    letter-spacing: 0;
    color: var(--yellow);
    margin: 0 4px;
  }

  .boxlid-lede {
    margin-top: 26px;
    background: var(--cream);
    color: var(--ink);
    border: 2px solid var(--ink);
    box-shadow: 4px 4px 0 0 var(--ink);
    padding: 20px 24px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 15px;
    line-height: 1.95;
    position: relative;
    transform: rotate(-0.4deg);
  }
  .boxlid-lede::before {
    content: "❝";
    position: absolute;
    top: -14px; left: 18px;
    font-family: 'Kaisei Decol', serif;
    font-size: 42px;
    color: var(--red);
    background: var(--cream);
    border: 2px solid var(--ink);
    width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    padding-top: 4px;
    box-shadow: 2px 2px 0 0 var(--ink);
  }
  .boxlid-lede .cta {
    color: var(--red-ink);
    font-weight: 700;
    text-decoration: none;
    background: var(--yellow);
    border: 1.5px solid var(--ink);
    padding: 1px 10px 2px;
    margin: 0 2px;
    display: inline-block;
    transform: rotate(-2deg);
    box-shadow: 2px 2px 0 0 var(--ink);
    white-space: nowrap;
  }
  .boxlid-lede .cta:hover { background: var(--cream); }

  /* ─── ピン留めの「画びょう」装飾 ──────────────── */
  .pin {
    position: absolute;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fff 0 2px, var(--red) 3px 60%, var(--red-ink) 100%);
    border: 1.5px solid var(--ink);
    box-shadow: 1px 2px 0 0 rgba(0,0,0,0.25);
    z-index: 5;
  }
  .pin.yellow { background: radial-gradient(circle at 35% 35%, #fff 0 2px, var(--yellow) 3px 60%, var(--yellow-ink) 100%); }
  .pin.blue   { background: radial-gradient(circle at 35% 35%, #fff 0 2px, var(--blue) 3px 60%, var(--blue-ink) 100%); }
  .pin.green  { background: radial-gradient(circle at 35% 35%, #fff 0 2px, var(--green) 3px 60%, var(--green-ink) 100%); }

  /* ─── フィルタ = 引き出し ────────────────────── */
  .drawer {
    margin-top: 44px;
    position: relative;
    background: var(--paper);
    border: 2px solid var(--ink);
    box-shadow: 6px 6px 0 0 var(--ink);
    padding: 26px 30px 22px;
  }
  /* ミシン目 */
  .drawer::before {
    content: "";
    position: absolute; left: 14px; right: 14px; top: 14px;
    border-top: 2px dashed var(--ink);
    opacity: 0.35;
  }
  .drawer-head {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 18px; flex-wrap: wrap;
  }
  .drawer-head .label {
    font-family: 'Kaisei Decol', serif;
    font-weight: 700;
    font-size: 22px;
    letter-spacing: 0.1em;
    background: var(--ink); color: var(--cream);
    padding: 4px 14px 6px;
    transform: rotate(-1.5deg);
    box-shadow: 3px 3px 0 0 var(--yellow);
  }
  .drawer-head .count {
    margin-left: auto;
    font-family: 'M PLUS 1 Code', monospace;
    font-size: 12px;
    letter-spacing: 0.15em;
    color: var(--ink-3);
    display: flex; align-items: baseline; gap: 6px;
    border: 1.5px solid var(--ink);
    background: var(--cream);
    padding: 5px 12px 6px;
    box-shadow: 2px 2px 0 0 var(--ink);
  }
  .drawer-head .count b {
    font-family: 'Kaisei Decol', serif;
    color: var(--red);
    font-size: 22px;
    letter-spacing: 0;
  }
  .drawer-head .count .slash { color: var(--ink-4); }

  .filters-grid { display: grid; grid-template-columns: 100px 1fr; gap: 10px 16px; align-items: start; }
  .filter-label {
    font-family: 'RocknRoll One', sans-serif;
    font-size: 13px;
    color: var(--ink);
    letter-spacing: 0.15em;
    background: var(--cream-2);
    border: 1.5px solid var(--ink);
    padding: 4px 10px;
    text-align: center;
    align-self: center;
    position: relative;
  }
  .filter-label::after {
    content: ""; position: absolute;
    right: -7px; top: 50%; transform: translateY(-50%);
    width: 0; height: 0;
    border-top: 6px solid transparent;
    border-bottom: 6px solid transparent;
    border-left: 7px solid var(--ink);
  }
  .filter-group { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; min-height: 34px; }
  .chip {
    border: 1.5px solid var(--ink);
    background: var(--paper);
    cursor: pointer;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-weight: 700;
    font-size: 12.5px;
    padding: 4px 12px 5px;
    color: var(--ink);
    letter-spacing: 0.05em;
    box-shadow: 2px 2px 0 0 var(--ink);
    transition: transform .08s, box-shadow .08s, background .12s, color .12s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .chip:hover { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 0 var(--ink); }
  .chip:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 0 var(--ink); }
  .chip.active {
    background: var(--ink); color: var(--yellow);
    box-shadow: 2px 2px 0 0 var(--red);
  }
  .chip.color-red   { background: var(--red); color: var(--cream); }
  .chip.color-blue  { background: var(--blue); color: var(--cream); }
  .chip.color-green { background: var(--green); color: var(--cream); }
  .chip.color-yellow{ background: var(--yellow); color: var(--ink); }
  .chip.active.color-red,
  .chip.active.color-blue,
  .chip.active.color-green,
  .chip.active.color-yellow { color: var(--yellow); background: var(--ink); }

  .reset-btn {
    border: 1.5px solid var(--ink); background: var(--cream);
    cursor: pointer; font-family: 'RocknRoll One', sans-serif;
    font-size: 12px; color: var(--red-ink);
    padding: 3px 12px 4px;
    letter-spacing: 0.1em;
    box-shadow: 2px 2px 0 0 var(--red);
    display: none;
  }
  .reset-btn::before { content: "× "; }
  .reset-btn.visible { display: inline-block; }
  .reset-btn:hover { background: var(--red); color: var(--cream); }

  /* ─── ヘッドライン(区切り) ──────────────────────── */
  .headline {
    margin: 48px 0 20px;
    display: flex; align-items: center; gap: 16px;
  }
  .headline .dots {
    flex: 1;
    border-top: 4px dotted var(--ink);
    opacity: 0.55;
  }
  .headline h2 {
    font-family: 'Kaisei Decol', serif;
    font-weight: 700;
    font-size: 28px;
    letter-spacing: 0.2em;
    background: var(--yellow);
    border: 2px solid var(--ink);
    padding: 4px 20px 6px;
    box-shadow: 4px 4px 0 0 var(--ink);
    transform: rotate(-1deg);
  }
  .headline .count-sm {
    font-family: 'M PLUS 1 Code', monospace;
    font-size: 13px; letter-spacing: 0.15em; color: var(--ink-3);
    border-left: 2px solid var(--ink);
    padding-left: 14px;
  }

  /* ─── カード一覧 ────────────────────────────────── */
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
    gap: 28px 24px;
  }
  @keyframes pop { from { opacity:0; transform: translateY(12px) rotate(var(--rot, 0deg)); } to { opacity:1; transform: translateY(0) rotate(var(--rot, 0deg)); } }
  .card {
    position: relative;
    background: var(--paper);
    border: 2px solid var(--ink);
    box-shadow: 5px 5px 0 0 var(--ink);
    transition: transform .18s cubic-bezier(.2,.9,.2,1.2), box-shadow .18s;
    animation: pop .35s cubic-bezier(.2,.9,.2,1.2) both;
    cursor: pointer;
  }
  .card:nth-child(3n)   { --rot: -0.6deg; }
  .card:nth-child(3n+1) { --rot:  0.5deg; }
  .card:nth-child(3n+2) { --rot: -0.2deg; }
  .card { transform: rotate(var(--rot, 0deg)); }
  .card:hover {
    transform: rotate(0) translate(-2px, -3px);
    box-shadow: 8px 9px 0 0 var(--ink);
  }
  .card.is-open {
    transform: rotate(0);
    box-shadow: 8px 9px 0 0 var(--ink);
  }

  /* カード上部の色バー(ジャンル表示) */
  .card-band {
    padding: 10px 16px 11px 70px;
    color: var(--cream);
    font-family: 'RocknRoll One', sans-serif;
    font-size: 12px;
    letter-spacing: 0.22em;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 2px solid var(--ink);
    position: relative;
  }
  .card-band.交流系 { background: var(--blue); }
  .card-band.学習系 { background: var(--green); }
  .card-band .minor {
    background: var(--cream); color: var(--ink);
    border: 1.5px solid var(--ink);
    padding: 1px 8px 2px;
    font-size: 10.5px;
    letter-spacing: 0.1em;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .card-body {
    padding: 22px 20px 18px;
    position: relative;
  }
  .card-num {
    position: absolute;
    top: -22px; left: -10px;
    width: 54px; height: 54px;
    background: var(--yellow);
    color: var(--ink);
    border: 2px solid var(--ink);
    font-family: 'Kaisei Decol', serif;
    font-weight: 700;
    font-size: 28px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 3px 3px 0 0 var(--ink);
    transform: rotate(-6deg);
    line-height: 1;
    padding-top: 4px;
    z-index: 3;
  }
  .card-num::before {
    content: "No.";
    position: absolute;
    top: -7px; left: 50%; transform: translateX(-50%);
    font-family: 'M PLUS 1 Code', monospace;
    font-size: 8px;
    letter-spacing: 0.1em;
    background: var(--ink); color: var(--yellow);
    padding: 1px 6px;
    border-radius: 2px;
  }

  /* 難易度チケット */
  .ticket {
    position: absolute;
    top: -12px; right: 14px;
    padding: 6px 14px 7px;
    font-family: 'RocknRoll One', sans-serif;
    font-size: 12px;
    letter-spacing: 0.2em;
    background: var(--red); color: var(--cream);
    border: 2px solid var(--ink);
    box-shadow: 2px 2px 0 0 var(--ink);
    transform: rotate(4deg);
    position: relative;
  }
  .ticket.やさしい { background: var(--green); }
  .ticket.ふつう { background: var(--yellow); color: var(--ink); }
  .ticket.しっかり { background: var(--red); }
  .ticket::before, .ticket::after {
    content: "";
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 6px; height: 6px; background: var(--cream);
    border: 1.5px solid var(--ink);
    border-radius: 50%;
  }
  .ticket::before { left: -4px; }
  .ticket::after  { right: -4px; }

  .card-title-row {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 14px; margin-top: 26px; margin-bottom: 12px;
  }
  .card-title {
    font-family: 'Kaisei Decol', serif;
    font-weight: 700;
    font-size: 22px;
    letter-spacing: 0.02em;
    line-height: 1.35;
    color: var(--ink);
    flex: 1;
  }
  .card-title-row .ticket { position: static; margin-top: 2px; transform: rotate(3deg); flex-shrink: 0; }

  .card-catch {
    font-size: 13.5px;
    line-height: 1.8;
    color: var(--ink-2);
    margin-bottom: 14px;
    font-weight: 500;
  }

  .card-meta {
    display: flex; flex-wrap: wrap; gap: 6px;
    padding-top: 12px;
    border-top: 2px dashed var(--ink);
    position: relative;
  }
  .card-meta::before {
    content: "✂"; 
    position: absolute; top: -10px; left: 10px;
    background: var(--paper); padding: 0 6px;
    color: var(--ink-4);
    font-size: 13px;
  }
  .meta-pill {
    font-family: 'M PLUS 1 Code', monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
    padding: 2px 8px 3px;
    border: 1.5px solid var(--ink);
    background: var(--cream);
    color: var(--ink);
    white-space: nowrap;
  }
  .meta-pill.time { background: var(--cream-2); }
  .meta-pill.prep-need { background: var(--red); color: var(--cream); }
  .meta-pill.prep-none {}

  /* ─── モーダル詳細 = おもちゃ箱から取り出したカード ──── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(31, 26, 23, 0.55);
    backdrop-filter: blur(2px);
    z-index: 100;
    display: none;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 20px;
    overflow-y: auto;
    animation: fadeIn .2s ease both;
  }
  .modal-overlay.is-open { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes modalPop {
    from { opacity: 0; transform: translateY(20px) rotate(-1deg) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) rotate(0) scale(1); }
  }
  .modal-card {
    position: relative;
    background: var(--paper);
    border: 2px solid var(--ink);
    box-shadow: 8px 8px 0 0 var(--ink);
    max-width: 720px;
    width: 100%;
    margin: auto;
    animation: modalPop .25s cubic-bezier(.2,.9,.2,1.2) both;
  }
  .modal-card .card-band {
    /* card-band スタイルを継承 */
    padding-right: 64px;  /* 閉じるボタン分 */
  }
  .modal-close {
    position: absolute;
    top: -16px; right: -16px;
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--red);
    color: var(--cream);
    border: 2px solid var(--ink);
    box-shadow: 3px 3px 0 0 var(--ink);
    font-family: 'Kaisei Decol', serif;
    font-weight: 700;
    font-size: 22px;
    line-height: 1;
    cursor: pointer;
    z-index: 2;
    transition: transform .15s, box-shadow .15s;
  }
  .modal-close:hover {
    transform: translate(-2px, -2px);
    box-shadow: 5px 5px 0 0 var(--ink);
  }
  .modal-body {
    padding: 26px 28px 32px;
  }
  .modal-title-row {
    display: flex; align-items: flex-start; gap: 14px;
    margin-bottom: 8px;
  }
  .modal-title {
    font-family: 'Kaisei Decol', serif;
    font-weight: 700;
    font-size: 28px;
    line-height: 1.3;
    color: var(--ink);
    flex: 1;
  }
  .modal-catch {
    font-size: 14px;
    color: var(--ink-3);
    margin-bottom: 16px;
    line-height: 1.7;
  }
  .modal-meta {
    display: flex; flex-wrap: wrap; gap: 8px;
    padding-bottom: 18px;
    margin-bottom: 22px;
    border-bottom: 1px dashed var(--ink-4);
  }
  .modal-detail {
    background: var(--cream);
    border: 1px solid var(--ink-4);
    padding: 22px 22px 24px;
    /* ノート罫線 */
    background-image:
      linear-gradient(var(--cream), var(--cream)),
      repeating-linear-gradient(
        to bottom,
        transparent 0 27px,
        rgba(31,26,23,0.08) 27px 28px
      );
    background-blend-mode: multiply;
  }
  body.modal-locked { overflow: hidden; }

  @media (max-width: 540px) {
    .modal-overlay { padding: 24px 12px; }
    .modal-close { width: 38px; height: 38px; font-size: 18px; top: -12px; right: -12px; }
    .modal-body { padding: 20px 18px 24px; }
    .modal-title { font-size: 22px; }
    .modal-detail { padding: 18px 16px 20px; }
  }

  .detail-block { margin-bottom: 20px; }
  .detail-block:last-child { margin-bottom: 0; }
  .detail-label {
    display: inline-block;
    font-family: 'RocknRoll One', sans-serif;
    font-size: 13px;
    letter-spacing: 0.14em;
    background: var(--ink);
    color: var(--yellow);
    padding: 3px 12px 4px;
    margin-bottom: 10px;
    box-shadow: 3px 3px 0 0 var(--red);
    transform: rotate(-1deg);
  }
  .detail-block:nth-child(3n) .detail-label { box-shadow: 3px 3px 0 0 var(--blue); }
  .detail-block:nth-child(3n+1) .detail-label { box-shadow: 3px 3px 0 0 var(--red); }
  .detail-block:nth-child(3n+2) .detail-label { box-shadow: 3px 3px 0 0 var(--green); }
  .detail-text {
    font-size: 13.5px;
    line-height: 1.95;
    color: var(--ink-2);
  }
  .detail-text p { margin: 0; }
  .detail-text ul, .detail-text ol { margin: 0; padding-left: 1.2em; }
  .detail-text ul { list-style: none; padding-left: 0; }
  .detail-text ul li { position: relative; padding-left: 22px; margin: 4px 0; }
  .detail-text ul li::before {
    content: "★";
    position: absolute; left: 0; top: 0;
    color: var(--red);
    font-size: 13px;
  }
  .detail-text ol { counter-reset: flow; list-style: none; padding-left: 0; }
  .detail-text ol li {
    counter-increment: flow;
    position: relative;
    padding-left: 36px;
    margin: 6px 0;
  }
  .detail-text ol li::before {
    content: counter(flow);
    position: absolute; left: 0; top: 2px;
    width: 24px; height: 24px;
    background: var(--yellow); border: 1.5px solid var(--ink);
    font-family: 'Kaisei Decol', serif;
    font-weight: 700;
    font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 2px 2px 0 0 var(--ink);
    line-height: 1;
  }

  /* スケジュール=時刻表 */
  .schedule {
    border: 2px solid var(--ink);
    background: var(--paper);
    box-shadow: 3px 3px 0 0 var(--ink);
    margin-top: 4px;
  }
  .schedule-head {
    background: var(--blue);
    color: var(--cream);
    padding: 6px 12px 7px;
    font-family: 'M PLUS 1 Code', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    display: flex; justify-content: space-between;
    border-bottom: 2px solid var(--ink);
  }
  .schedule-head b { font-family: 'Kaisei Decol', serif; font-size: 14px; letter-spacing: 0; }
  .schedule-row {
    display: grid;
    grid-template-columns: 34px 1fr 70px;
    gap: 12px;
    padding: 8px 12px;
    border-bottom: 1.5px dashed rgba(31,26,23,0.25);
    font-size: 13px;
    align-items: center;
  }
  .schedule-row:last-child { border-bottom: none; }
  .schedule-num {
    font-family: 'M PLUS 1 Code', monospace;
    font-size: 11px;
    background: var(--ink); color: var(--yellow);
    text-align: center;
    padding: 2px 0 3px;
  }
  .schedule-time {
    font-family: 'M PLUS 1 Code', monospace;
    font-size: 11.5px;
    color: var(--ink-3);
    text-align: right;
  }

  /* フラッグ: 開く・閉じる */
  .card-flag {
    position: absolute;
    right: 16px; bottom: -14px;
    padding: 5px 14px 6px;
    background: var(--ink); color: var(--yellow);
    font-family: 'RocknRoll One', sans-serif;
    font-size: 12px;
    letter-spacing: 0.15em;
    border: 2px solid var(--ink);
    box-shadow: 2px 2px 0 0 var(--red);
    clip-path: polygon(0 0, 100% 0, 90% 100%, 10% 100%);
  }
  .card.is-open .card-flag { background: var(--red); color: var(--cream); }

  /* ─── 空 ─── */
  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 56px 20px;
    background: var(--paper);
    border: 2px dashed var(--ink);
    font-family: 'Kaisei Decol', serif;
    font-weight: 700;
    font-size: 17px;
    color: var(--ink-3);
    letter-spacing: 0.1em;
  }
  .empty::before { content: "☹  "; color: var(--red); }

  /* ─── フッター ─────────────────────────────────── */
  footer {
    margin-top: 72px;
    background: var(--ink);
    color: var(--cream);
    border: 2px solid var(--ink);
    box-shadow: 6px 6px 0 0 var(--red);
    padding: 28px 28px 30px;
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 14px;
  }
  footer .logo {
    font-family: 'Kaisei Decol', serif;
    font-weight: 700;
    font-size: 28px;
    letter-spacing: 0.08em;
  }
  footer .logo .dot { color: var(--red); }
  footer .mini {
    font-family: 'M PLUS 1 Code', monospace;
    font-size: 11px;
    letter-spacing: 0.22em;
    color: var(--cream-2);
  }

  /* ─── モバイル ─────────────────────────────────── */
  @media (max-width: 720px) {
    .page { padding: 18px 14px 60px; }
    .boxlid { padding: 22px 18px 30px; box-shadow: 0 0 0 3px var(--cream) inset, 0 0 0 4px var(--ink) inset, 4px 4px 0 0 var(--ink); }
    .boxlid-top { font-size: 9.5px; gap: 8px; flex-wrap: wrap; }
    .boxlid-main { grid-template-columns: 1fr; gap: 14px; }
    .boxlid-sub-wrap { text-align: left; }
    .boxlid-title { font-size: clamp(44px, 14vw, 80px); text-shadow: 3px 3px 0 var(--ink); white-space: nowrap; }
    .boxlid-lede { font-size: 14px; padding: 16px 16px 18px; }

    .drawer { padding: 20px 16px 18px; box-shadow: 4px 4px 0 0 var(--ink); }
    .drawer-head .label { font-size: 18px; padding: 3px 12px; }
    .filters-grid { grid-template-columns: 1fr; gap: 6px 0; }
    .filter-label { text-align: left; width: fit-content; padding: 3px 10px; }
    .filter-label::after { display: none; }

    .headline h2 { font-size: 22px; padding: 3px 16px; }
    .headline { gap: 10px; }

    .cards { grid-template-columns: 1fr; gap: 40px 0; }
    .card { transform: rotate(0) !important; }
    .card-num { width: 46px; height: 46px; font-size: 24px; top: -14px; }
    .card-title { font-size: 19px; }

    footer { padding: 20px; }
    footer .logo { font-size: 22px; }
  }

  @media print {
    body::before { display: none; }
    .drawer, .reset-btn, .card-flag { display: none !important; }
    .card { break-inside: avoid; }
    .card-open-note { display: block !important; }
  }
</style>
</head>
<body>
<div class="page">

  <!-- ─── 箱のフタ(ヘッダー) ─── -->
  <header class="boxlid">
    <span class="pin yellow" style="top: 14px; left: 14px;"></span>
    <span class="pin blue" style="top: 14px; right: 14px;"></span>
    <span class="pin green" style="bottom: 14px; left: 14px;"></span>
    <span class="pin" style="bottom: 14px; right: 14px;"></span>

    <div class="boxlid-top">
      <span class="corner"><span class="dot"></span>手話サークル企画集</span>
    </div>
    <div class="boxlid-main">
      <h1 class="boxlid-title">手話<span class="reco">レコ</span><span class="star" aria-hidden="true"></span></h1>
      <div class="boxlid-sub-wrap">
        <div class="subtitle-ribbon">レクリエーションコレクション</div>
        <div class="volume-stamp">全 <b id="vol-count">20</b> 件収録</div>
      </div>
    </div>
    <div class="boxlid-lede">
      どんな企画をしたらいいか分からない。そんなときの、おもちゃ箱。
      各地のサークル運営から集めた企画案を、目的・流れ・タイムスケジュールまで、そのまま持ち込める形で詰め込みました。
      提案は<a class="cta" href="#">こちら</a>から。
    </div>
  </header>

  <!-- ─── 絞り込み(引き出し) ─── -->
  <section class="drawer" aria-label="絞り込み">
    <div class="drawer-head">
      <span class="label">▼ 開けゴマ！</span>
      <span class="count"><span class="slash">表示中</span><b id="count-big">20</b>/<span id="count-total">20</span>件</span>
    </div>
    <div class="filters-grid" id="filters"></div>
  </section>

  <!-- ─── 区切り ─── -->
  <div class="headline">
    <span class="dots"></span>
    <h2>あそび一覧</h2>
    <span class="count-sm" id="sort-label">全20件</span>
    <span class="dots"></span>
  </div>

  <!-- ─── カード一覧 ─── -->
  <main id="entries" class="cards"></main>

  <!-- ─── 詳細モーダル ─── -->
  <div class="modal-overlay" id="modal" onclick="closeModal(event)">
    <div class="modal-card" id="modal-card" onclick="event.stopPropagation()"></div>
  </div>

  <footer>
    <span class="logo">手話<span class="dot">・</span>レコ</span>
  </footer>
</div>

<script src="data.js"></script>
<script>
// ─── State ─────────
let filters = { major:null, minor:null, time:null, people:null, diff:null, prep:null };

const MAJOR_COLOR_CLASS = { "交流系":"color-blue", "学習系":"color-green" };
const DIFF_COLOR_CLASS  = { "やさしい":"color-green", "ふつう":"color-yellow", "しっかり":"color-red" };

function render(){ renderFilters(); renderEntries(); }

function renderFilters(){
  const nav = document.getElementById('filters');
  let html = '';
  html += filterRow('分類',   ['交流系','学習系'].map(v => chip(v,'major', MAJOR_COLOR_CLASS[v])).join(''));
  if (filters.major) {
    html += filterRow('種別',  MINORS[filters.major].map(v => chip(v,'minor')).join(''));
  }
  html += filterRow('時間',   TIMES.map(v => chip(v,'time')).join(''));
  html += filterRow('人数',   PEOPLES.map(v => chip(v,'people')).join(''));
  html += filterRow('難易度', DIFFS.map(v => chip(v,'diff', DIFF_COLOR_CLASS[v])).join(''));
  html += filterRow('準備',   PREPS.map(v => chip(v,'prep', v==='必要'?'color-red':'')).join(''));
  const hasFilter = Object.values(filters).some(v => v !== null);
  html += `<div></div><div><button class="reset-btn ${hasFilter?'visible':''}" onclick="clearFilters()">絞り込みをリセット</button></div>`;
  nav.innerHTML = html;
}
function filterRow(label, btns){
  return `<div class="filter-label">${label}</div><div class="filter-group">${btns}</div>`;
}
function chip(value, key, extraClass=''){
  const active = filters[key] === value ? ' active' : '';
  return `<button class="chip ${extraClass}${active}" onclick="toggleFilter('${key}','${value}')">${value}</button>`;
}
function toggleFilter(key, value){
  filters[key] = filters[key] === value ? null : value;
  if (key==='major') filters.minor = null;
  render();
}
function clearFilters(){
  filters = { major:null, minor:null, time:null, people:null, diff:null, prep:null };
  render();
}
function getFiltered(){
  return ACTIVITIES.filter(a => {
    if (filters.major && a.major !== filters.major) return false;
    if (filters.minor && a.minor !== filters.minor) return false;
    if (filters.time && a.time !== filters.time) return false;
    if (filters.people && a.people !== filters.people) return false;
    if (filters.diff && a.diff !== filters.diff) return false;
    if (filters.prep && a.prep !== filters.prep) return false;
    return true;
  });
}

function renderEntries(){
  const filtered = getFiltered();
  document.getElementById('count-big').textContent = filtered.length;
  document.getElementById('sort-label').textContent = `全${filtered.length}件`;
  const main = document.getElementById('entries');
  if (filtered.length === 0){
    main.innerHTML = '<div class="empty">条件に合う企画は みつかりませんでした</div>';
    return;
  }
  main.innerHTML = filtered.map((a,i) => {
    const num = String(i+1).padStart(2,'0');
    return `
    <article class="card" style="animation-delay:${i*0.04}s" onclick="openModal(${a.id})">
      <div class="card-band ${a.major}">
        <span>${a.major}</span>
        <span class="minor">${a.minor}</span>
      </div>
      <div class="card-body">
        <div class="card-num">${num}</div>
        <div class="card-title-row">
          <h3 class="card-title">${escapeHtml(a.title)}</h3>
          <span class="ticket ${a.diff}">${a.diff}</span>
        </div>
        <p class="card-catch">${escapeHtml(a.catch)}</p>
        <div class="card-meta">
          <span class="meta-pill time">⏱ ${escapeHtml(a.time)}</span>
          <span class="meta-pill">👥 ${escapeHtml(a.people)}</span>
          <span class="meta-pill ${a.prep==='必要'?'prep-need':'prep-none'}">準備${a.prep==='必要'?'要':'不要'}</span>
        </div>
      </div>
      <span class="card-flag">▼ ひらく</span>
    </article>`;
  }).join('');
}

function renderModal(a){
  const num = String(ACTIVITIES.findIndex(x=>x.id===a.id)+1).padStart(2,'0');
  return `
    <div class="card-band ${a.major}">
      <span>${a.major}</span>
      <span class="minor">${a.minor}</span>
    </div>
    <button class="modal-close" onclick="closeModal()" aria-label="閉じる">×</button>
    <div class="modal-body">
      <div class="card-num">${num}</div>
      <div class="modal-title-row">
        <h2 class="modal-title">${escapeHtml(a.title)}</h2>
        <span class="ticket ${a.diff}">${a.diff}</span>
      </div>
      <p class="modal-catch">${escapeHtml(a.catch)}</p>
      <div class="modal-meta">
        <span class="meta-pill time">⏱ ${escapeHtml(a.time)}</span>
        <span class="meta-pill">👥 ${escapeHtml(a.people)}</span>
        <span class="meta-pill ${a.prep==='必要'?'prep-need':'prep-none'}">準備${a.prep==='必要'?'要':'不要'}</span>
      </div>
      <div class="modal-detail">
        ${detailBlock('目的', a.purpose)}
        ${detailBlock('企画設計', a.design)}
        ${flowBlock(a.flow)}
        ${scheduleBlock(a.schedule)}
        ${detailBlock('コツ・アレンジ', a.tips)}
        ${detailBlock('準備するもの', a.materials)}
      </div>
    </div>`;
}

function detailBlock(label, content){
  let body;
  if (Array.isArray(content)) body = '<ul>' + content.map(c=>`<li>${escapeHtml(c)}</li>`).join('') + '</ul>';
  else body = `<p>${escapeHtml(content).replace(/\n/g,'<br>')}</p>`;
  return `<div class="detail-block"><span class="detail-label">${label}</span><div class="detail-text">${body}</div></div>`;
}
function flowBlock(steps){
  const items = steps.map(s=>`<li>${escapeHtml(s)}</li>`).join('');
  return `<div class="detail-block"><span class="detail-label">流れ</span><div class="detail-text"><ol>${items}</ol></div></div>`;
}
function scheduleBlock(sched){
  if (!sched) return '';
  const rows = sched.steps.map((s,i)=>
    `<div class="schedule-row"><span class="schedule-num">${String(i+1).padStart(2,'0')}</span><span>${escapeHtml(s.label)}</span><span class="schedule-time">${escapeHtml(s.min)}</span></div>`
  ).join('');
  return `<div class="detail-block"><span class="detail-label">タイムスケジュール例</span><div class="schedule"><div class="schedule-head"><span>合計</span><b>${escapeHtml(sched.total)}</b></div>${rows}</div></div>`;
}
function escapeHtml(s){
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function openModal(id){
  const a = ACTIVITIES.find(x => x.id === id);
  if (!a) return;
  const modal = document.getElementById('modal');
  document.getElementById('modal-card').innerHTML = renderModal(a);
  modal.classList.add('is-open');
  document.body.classList.add('modal-locked');
}
function closeModal(event){
  // overlay クリックで閉じる時は target===overlay の時のみ
  if (event && event.target && event.currentTarget && event.target !== event.currentTarget && event.type === 'click') {
    return;
  }
  document.getElementById('modal').classList.remove('is-open');
  document.body.classList.remove('modal-locked');
}
// Esc で閉じる
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

document.getElementById('vol-count').textContent = String(ACTIVITIES.length);
document.getElementById('count-total').textContent = String(ACTIVITIES.length);
render();
</script>
</body>
</html>
